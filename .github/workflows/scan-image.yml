name: Scan image for vulnerabilities
on:
  workflow_call:
    inputs:
      ECR_REPOSITORY:
        required: true
        type: string
      ECR_REGION:
        required: true
        type: string
    secrets:
      ECR_REGISTRY:
        required: true
      ECR_ROLE_TO_ASSUME:
        required: true

jobs:
  trivy-image-scan:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read  # This is required for actions/checkout
    steps:
      - name: Assume role in Cloud Platform
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.1.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.ECR_REGION }}

      - name: Login to container repository
        uses: aws-actions/amazon-ecr-login@261fc3d4806db1fa66a15cc11113c456db8870a7 #v2.1.2
        id: login-ecr
        with:
          mask-password: true

      - name: Scan for breaking vulnerabilities
        run: exit 0 # trivy-action step removed
      - name: Scan for vulnerabilities (informative, non-breaking)
        run: exit 0 # trivy-action step removed
